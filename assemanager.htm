<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Kisan Mitra | Neon Executive Dashboard</title>
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- Font Awesome 6 (free icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0A0C15;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      padding: 28px 24px;
      min-height: 100vh;
      position: relative;
    }

    /* animated gradient background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 30%, rgba(255, 90, 50, 0.08), rgba(10, 12, 21, 0.95));
      pointer-events: none;
      z-index: 0;
    }

    .dashboard-container {
      max-width: 1400px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    /* modern glass header */
    .glass-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 32px;
      padding: 20px 24px;
      background: rgba(18, 22, 35, 0.65);
      backdrop-filter: blur(14px);
      border-radius: 32px;
      border: 1px solid rgba(255, 120, 70, 0.25);
      box-shadow: 0 12px 32px -12px rgba(0,0,0,0.5);
    }

    .logo-area h1 {
      font-size: 1.9rem;
      font-weight: 800;
      background: linear-gradient(125deg, #FFB347, #FF3D6C, #A742FF);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .logo-area p {
      color: #8E9BB0;
      font-size: 0.75rem;
      margin-top: 5px;
      font-weight: 500;
    }

    .stat-badge {
      background: rgba(255, 180, 71, 0.12);
      padding: 10px 22px;
      border-radius: 48px;
      border: 1px solid rgba(255, 120, 70, 0.4);
      font-weight: 600;
      color: #FFD6A5;
      font-size: 0.85rem;
    }

    /* KPI cards premium */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 20px;
      margin-bottom: 36px;
    }

    .kpi-card {
      background: linear-gradient(135deg, #131A2C, #0E1322);
      border-radius: 28px;
      padding: 18px 20px;
      border: 1px solid rgba(255, 160, 80, 0.2);
      box-shadow: 0 10px 20px -5px rgba(0,0,0,0.4);
      transition: 0.2s;
      backdrop-filter: blur(4px);
    }

    .kpi-card:hover { border-color: #FF9F4A; transform: translateY(-3px); }
    .kpi-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: #FFB87C; }
    .kpi-value { font-size: 2rem; font-weight: 800; color: white; margin: 8px 0 4px; }
    .kpi-sub { font-size: 0.7rem; color: #8E9BB0; }

    /* chart + mouja summary row (modern) */
    .insight-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      margin-bottom: 40px;
    }
    .chart-glass {
      flex: 2;
      background: rgba(16, 20, 32, 0.65);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 20px;
      border: 1px solid rgba(255, 130, 70, 0.3);
    }
    .mouja-glass {
      flex: 1.2;
      background: rgba(16, 20, 32, 0.6);
      backdrop-filter: blur(10px);
      border-radius: 32px;
      padding: 20px;
      border: 1px solid rgba(255, 160, 80, 0.25);
    }
    .section-header {
      font-size: 0.85rem;
      font-weight: 700;
      color: #FFC285;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-left: 3px solid #FF6A3D;
      padding-left: 12px;
    }
    .mouja-scroll {
      max-height: 240px;
      overflow-y: auto;
      padding-right: 6px;
    }
    .mouja-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,210,0.08);
      font-size: 0.8rem;
      color: #DFE6F5;
    }
    .mouja-name { font-weight: 500; }
    .mouja-due { color: #FF9F6E; font-weight: 700; }

    /* search + action bar modern */
    .action-bar-modern {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 28px;
      background: rgba(12, 16, 26, 0.7);
      backdrop-filter: blur(8px);
      padding: 8px 20px 8px 24px;
      border-radius: 80px;
      border: 1px solid rgba(255, 140, 70, 0.3);
    }
    .search-group {
      flex: 3;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .search-group i {
      color: #FF9F4A;
      font-size: 1rem;
    }
    .search-group input {
      background: transparent;
      border: none;
      padding: 12px 8px;
      color: white;
      font-size: 0.85rem;
      width: 100%;
      outline: none;
      letter-spacing: 0.3px;
    }
    .btn-neon {
      background: linear-gradient(105deg, #FF8C42, #FF3D6C);
      border: none;
      border-radius: 60px;
      padding: 10px 28px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: 0.15s;
      font-size: 0.8rem;
      box-shadow: 0 5px 12px rgba(255, 60, 80, 0.3);
    }
    .btn-neon:active { transform: scale(0.96); }

    /* SINGLE COLUMN CARD STACK — ultra modern */
    .cards-stack {
      display: flex;
      flex-direction: column;
      gap: 22px;
      margin-top: 16px;
    }
    .farmer-card {
      background: linear-gradient(115deg, #121827, #0C1120);
      border-radius: 32px;
      border: 1px solid rgba(255, 130, 70, 0.35);
      transition: all 0.25s ease;
      overflow: hidden;
      box-shadow: 0 12px 24px -12px rgba(0,0,0,0.6);
    }
    .farmer-card:hover {
      border-color: #FFA255;
      transform: translateX(6px);
      box-shadow: 0 20px 30px -12px rgba(255, 80, 40, 0.2);
    }
    .card-header-modern {
      padding: 14px 22px;
      background: rgba(255, 140, 70, 0.05);
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,200,100,0.12);
    }
    .sl-chip {
      background: linear-gradient(125deg, #FFB347, #FF6A3D);
      padding: 4px 16px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 800;
      color: #0a0e1a;
    }
    .type-chip {
      background: rgba(255, 200, 120, 0.15);
      padding: 4px 14px;
      border-radius: 40px;
      font-size: 0.7rem;
      color: #FFD6AA;
    }
    .card-body-3col {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px 20px;
      padding: 20px 22px;
    }
    .info-modern {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 20px;
      padding: 8px 12px;
      text-align: center;
      border: 1px solid rgba(255, 180, 80, 0.1);
    }
    .info-label-modern {
      font-size: 0.6rem;
      text-transform: uppercase;
      font-weight: 700;
      color: #FFB87C;
      letter-spacing: 0.6px;
    }
    .info-value-modern {
      font-size: 0.8rem;
      font-weight: 600;
      color: #F0F3FC;
      margin-top: 5px;
    }
    .due-glow-card {
      background: linear-gradient(145deg, #FF3D6C15, #FF9A4420);
      border-left: 2px solid #FF784B;
    }
    .card-footer-action {
      padding: 12px 22px 20px 22px;
      display: flex;
      justify-content: flex-end;
      border-top: 1px solid rgba(255,220,140,0.08);
    }
    .edit-neon {
      background: rgba(255, 140, 66, 0.9);
      border: none;
      border-radius: 40px;
      padding: 8px 28px;
      font-weight: 700;
      color: #0E1120;
      cursor: pointer;
      transition: 0.1s;
      font-size: 0.7rem;
    }
    .empty-state {
      background: rgba(30, 35, 55, 0.7);
      border-radius: 48px;
      padding: 60px 20px;
      text-align: center;
      color: #B2C1E0;
      backdrop-filter: blur(8px);
    }
    /* form panel */
    .form-panel-premium {
      background: #111725e6;
      backdrop-filter: blur(20px);
      border-radius: 40px;
      padding: 28px;
      border: 1px solid #FFB34755;
    }
    .form-grid-modern {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px,1fr));
      gap: 20px;
      margin: 24px 0;
    }
    .input-premium {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .input-premium label { font-size: 0.7rem; font-weight: 700; color: #FFBD82; letter-spacing: 0.5px; }
    .input-premium input {
      background: #0C1122;
      border: 1px solid #2D3650;
      border-radius: 28px;
      padding: 12px 16px;
      color: white;
      font-size: 0.8rem;
    }
    .input-premium input:focus { border-color: #FF9A44; outline: none; }
    @media (max-width: 680px) {
      .card-body-3col { grid-template-columns: 1fr 1fr; gap: 12px; }
      body { padding: 16px; }
    }
  </style>
</head>
<body>
<div class="dashboard-container">
  <!-- glass header -->
  <div class="glass-header">
    <div class="logo-area">
      <h1><i class="fas fa-seedling"></i> KISAN MITRA · NEO</h1>
      <p>real‑time search | mouja analytics | premium cards</p>
    </div>
    <div class="stat-badge"><i class="fas fa-chart-line"></i> Live Dashboard</div>
  </div>

  <!-- KPI row -->
  <div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-title"><i class="fas fa-users"></i> TOTAL FARMERS</div><div class="kpi-value" id="totalFarmersKpi">0</div><div class="kpi-sub">registered growers</div></div>
    <div class="kpi-card"><div class="kpi-title"><i class="fas fa-rupee-sign"></i> TOTAL DUE</div><div class="kpi-value" id="totalDueKpi">₹0</div><div class="kpi-sub">outstanding amount</div></div>
    <div class="kpi-card"><div class="kpi-title"><i class="fas fa-chart-simple"></i> AVG DUE</div><div class="kpi-value" id="avgDueKpi">₹0</div><div class="kpi-sub">per farmer</div></div>
    <div class="kpi-card"><div class="kpi-title"><i class="fas fa-map-marker-alt"></i> MOUJA COUNT</div><div class="kpi-value" id="moujaCountKpi">0</div><div class="kpi-sub">unique regions</div></div>
  </div>

  <!-- Chart + Mouja summary panel (bar chart shows ALL mouja) -->
  <div class="insight-panel">
    <div class="chart-glass">
      <div class="section-header"><i class="fas fa-chart-column"></i> MOUJA WISE DUE (ALL)</div>
      <canvas id="fullMoujaChart" width="400" height="220" style="max-height: 220px; width:100%"></canvas>
    </div>
    <div class="mouja-glass">
      <div class="section-header"><i class="fas fa-list-ul"></i> PENDING SUMMARY · MOUJA</div>
      <div id="moujaListContainer" class="mouja-scroll">Loading data...</div>
    </div>
  </div>

  <!-- search + add action bar (real time search) -->
  <div class="action-bar-modern">
    <div class="search-group">
      <i class="fas fa-search"></i>
      <input type="text" id="realtimeSearch" placeholder="Instant search · name, village, mouja, plot, type ..." autocomplete="off">
    </div>
    <button class="btn-neon" id="openFormBtn"><i class="fas fa-plus-circle"></i> Add New Farmer</button>
  </div>

  <!-- single column card list -->
  <div id="listSection">
    <div id="cardsStack" class="cards-stack"></div>
  </div>

  <!-- form panel hidden -->
  <div id="formSection" style="display:none;">
    <div class="form-panel-premium">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3 style="color:#FFD6AA;"><i class="fas fa-edit"></i> Farmer Registration</h3>
        <button id="closeFormBtn" style="background:#2F3A5C; border:none; border-radius:40px; padding:6px 20px; color:white;">✖ Close</button>
      </div>
      <input type="hidden" id="rowIndex">
      <div class="form-grid-modern">
        <div class="input-premium"><label>SL (Auto)</label><input id="sl" readonly></div>
        <div class="input-premium"><label>FULL NAME</label><input id="name" placeholder="Farmer name"></div>
        <div class="input-premium"><label>C/O</label><input id="co" placeholder="Father/Husband"></div>
        <div class="input-premium"><label>Village</label><input id="village" placeholder="Village"></div>
        <div class="input-premium"><label>MOUJA</label><input id="mouja" placeholder="Mouja name"></div>
        <div class="input-premium"><label>PLOT</label><input id="plot" placeholder="Plot no"></div>
        <div class="input-premium"><label>AREA (Acres)</label><input id="area" placeholder="Area"></div>
        <div class="input-premium"><label>DUE (₹)</label><input id="due" placeholder="Due amount"></div>
        <div class="input-premium"><label>PAID UP TO</label><input id="paid" placeholder="Year/Month"></div>
        <div class="input-premium"><label>FARMER TYPE</label><input id="type" placeholder="Marginal/Small"></div>
        <div class="input-premium"><label>R.PAGE NO</label><input id="page" placeholder="Page"></div>
      </div>
      <div style="display:flex; gap:16px;">
        <button id="saveBtn" class="btn-neon">💾 SAVE RECORD</button>
        <button id="updateBtn" class="btn-neon" style="display:none; background:#2D5F8B;">🔄 UPDATE FARMER</button>
      </div>
    </div>
  </div>
</div>

<script>
  const WEB_URL = "https://script.google.com/macros/s/AKfycbyLeDl5fLfR-EuH59NJuyGjO44ETHI9zq2I5TkqzsI91pyNjZZuz_yAzOpZ6vgtal4e/exec";
  let tableData = [];
  let filteredData = [];
  let moujaChartGlobal = null;

  // DOM elements
  const cardsStack = document.getElementById("cardsStack");
  const realtimeSearch = document.getElementById("realtimeSearch");
  const openFormBtn = document.getElementById("openFormBtn");
  const closeFormBtn = document.getElementById("closeFormBtn");
  const listSection = document.getElementById("listSection");
  const formSection = document.getElementById("formSection");
  const saveBtn = document.getElementById("saveBtn");
  const updateBtn = document.getElementById("updateBtn");
  const rowIndexInput = document.getElementById("rowIndex");
  const slInput = document.getElementById("sl");
  const nameInput = document.getElementById("name");
  const coInput = document.getElementById("co");
  const villageInput = document.getElementById("village");
  const moujaInput = document.getElementById("mouja");
  const plotInput = document.getElementById("plot");
  const areaInput = document.getElementById("area");
  const dueInput = document.getElementById("due");
  const paidInput = document.getElementById("paid");
  const typeInput = document.getElementById("type");
  const pageInput = document.getElementById("page");

  function escapeHtml(str) { if(!str) return '—'; return String(str).replace(/[&<>]/g, (m) => m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
  function formatDue(val) { let n = parseFloat(val); return !isNaN(n) ? `₹ ${n.toLocaleString()}` : escapeHtml(val); }

  // update KPI, mouja summary + FULL bar chart (all moujas)
  function updateInsights(dataArray) {
    const source = dataArray || tableData;
    let totalFarmers = source.length;
    let totalDue = 0;
    const moujaMap = new Map();
    source.forEach(row => {
      let dueVal = parseFloat(row[7]);
      if(isNaN(dueVal)) dueVal = 0;
      totalDue += dueVal;
      let moujaName = (row[4] && row[4].trim() !== "") ? row[4].trim() : "Unknown";
      moujaMap.set(moujaName, (moujaMap.get(moujaName) || 0) + dueVal);
    });
    let avgDue = totalFarmers ? (totalDue / totalFarmers) : 0;
    document.getElementById("totalFarmersKpi").innerText = totalFarmers;
    document.getElementById("totalDueKpi").innerHTML = `₹ ${totalDue.toLocaleString()}`;
    document.getElementById("avgDueKpi").innerHTML = `₹ ${avgDue.toFixed(0)}`;
    document.getElementById("moujaCountKpi").innerText = moujaMap.size;

    // Mouja summary list (right side)
    let sortedMouja = Array.from(moujaMap.entries()).sort((a,b)=>b[1]-a[1]);
    let moujaHtml = '';
    sortedMouja.forEach(([mouja, amt]) => {
      moujaHtml += `<div class="mouja-row"><span class="mouja-name"><i class="fas fa-map-pin"></i> ${escapeHtml(mouja)}</span><span class="mouja-due">₹ ${amt.toLocaleString()}</span></div>`;
    });
    if(sortedMouja.length === 0) moujaHtml = '<div style="color:#aaa;">No mouja data</div>';
    document.getElementById("moujaListContainer").innerHTML = moujaHtml;

    // BAR CHART: show ALL mouja (all entries)
    const allLabels = sortedMouja.map(m => m[0].length > 14 ? m[0].substring(0,12)+'..' : m[0]);
    const allValues = sortedMouja.map(m => m[1]);
    const ctx = document.getElementById('fullMoujaChart').getContext('2d');
    if(moujaChartGlobal) moujaChartGlobal.destroy();
    moujaChartGlobal = new Chart(ctx, {
      type: 'bar',
      data: { labels: allLabels, datasets: [{ label: 'Due Amount (₹)', data: allValues, backgroundColor: 'rgba(255, 140, 70, 0.85)', borderRadius: 8, borderColor: '#FFB347', borderWidth: 1 }] },
      options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#FFD2A5', font: {size:10} } }, tooltip: { callbacks: { label: (ctx) => `₹ ${ctx.raw.toLocaleString()}` } } }, scales: { y: { ticks: { color: '#BBB', stepSize: (Math.max(...allValues,1)/5) }, grid: { color: '#2a3455' } }, x: { ticks: { color: '#CCD6F0', rotation: 30, font: {size:9} } } } }
    });
  }

  // real-time search: partial matching on ANY column
  function realtimeSearchAndRender() {
    const term = realtimeSearch.value.trim().toLowerCase();
    if(term === "") {
      filteredData = [...tableData];
    } else {
      filteredData = tableData.filter(row => row.some(cell => cell !== undefined && cell !== null && String(cell).toLowerCase().includes(term)));
    }
    renderCards(filteredData);
    updateInsights(tableData);  // keep full insights based on all data (global mouja stats)
  }

  // render single column modern cards
  function renderCards(dataToRender) {
    if(!cardsStack) return;
    const display = dataToRender || [];
    if(display.length === 0) {
      cardsStack.innerHTML = `<div class="empty-state"><i class="fas fa-filter"></i> ✨ No matching farmers. Try different keyword or add new entry ✨</div>`;
      return;
    }
    let html = '';
    display.forEach((row, idx) => {
      const sl = row[0] || '—';
      const name = row[1] || '—';
      const co = row[2] || '—';
      const village = row[3] || '—';
      const mouja = row[4] || '—';
      const plot = row[5] || '—';
      const area = row[6] || '—';
      const dueRaw = row[7] || '0';
      const paid = row[8] || '—';
      const farmerType = row[9] || '—';
      const pageNo = row[10] || '—';
      const dueDisplay = formatDue(dueRaw);
      const globalIndex = tableData.findIndex(orig => orig === row);
      html += `
        <div class="farmer-card">
          <div class="card-header-modern">
            <span class="sl-chip"><i class="fas fa-hashtag"></i> SL ${escapeHtml(sl)}</span>
            <span class="type-chip"><i class="fas fa-tractor"></i> ${escapeHtml(farmerType)}</span>
          </div>
          <div class="card-body-3col">
            <div class="info-modern"><div class="info-label-modern">👤 NAME</div><div class="info-value-modern">${escapeHtml(name)}</div></div>
            <div class="info-modern"><div class="info-label-modern">👪 C/O</div><div class="info-value-modern">${escapeHtml(co)}</div></div>
            <div class="info-modern"><div class="info-label-modern">🏘️ VILLAGE</div><div class="info-value-modern">${escapeHtml(village)}</div></div>
            <div class="info-modern"><div class="info-label-modern">🗺️ MOUJA</div><div class="info-value-modern">${escapeHtml(mouja)}</div></div>
            <div class="info-modern"><div class="info-label-modern">📌 PLOT</div><div class="info-value-modern">${escapeHtml(plot)}</div></div>
            <div class="info-modern"><div class="info-label-modern">📐 AREA</div><div class="info-value-modern">${escapeHtml(area)}</div></div>
            <div class="info-modern due-glow-card"><div class="info-label-modern">💰 DUE</div><div class="info-value-modern">${dueDisplay}</div></div>
            <div class="info-modern"><div class="info-label-modern">📆 PAID UP TO</div><div class="info-value-modern">${escapeHtml(paid)}</div></div>
            <div class="info-modern"><div class="info-label-modern">📖 R.PAGE</div><div class="info-value-modern">${escapeHtml(pageNo)}</div></div>
          </div>
          <div class="card-footer-action">
            <button class="edit-neon" data-edit-idx="${globalIndex}"><i class="fas fa-pen-alt"></i> EDIT RECORD</button>
          </div>
        </div>
      `;
    });
    cardsStack.innerHTML = html;
    attachEditEvents();
  }

  function attachEditEvents() {
    document.querySelectorAll('.edit-neon').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const idx = btn.getAttribute('data-edit-idx');
        if(idx !== null) editRowByIndex(parseInt(idx));
      });
    });
  }

  // edit logic
  function editRowByIndex(index) {
    const row = tableData[index];
    if(!row) return;
    listSection.style.display = "none";
    formSection.style.display = "block";
    saveBtn.style.display = "none";
    updateBtn.style.display = "inline-flex";
    rowIndexInput.value = index;
    slInput.value = row[0] || "";
    nameInput.value = row[1] || "";
    coInput.value = row[2] || "";
    villageInput.value = row[3] || "";
    moujaInput.value = row[4] || "";
    plotInput.value = row[5] || "";
    areaInput.value = row[6] || "";
    dueInput.value = row[7] || "";
    paidInput.value = row[8] || "";
    typeInput.value = row[9] || "";
    pageInput.value = row[10] || "";
  }

  function getFormData() { return [slInput.value, nameInput.value, coInput.value, villageInput.value, moujaInput.value, plotInput.value, areaInput.value, dueInput.value, paidInput.value, typeInput.value, pageInput.value]; }

  async function addData() {
    const newData = getFormData();
    if(!newData[1]?.trim()) { alert("Farmer name required"); return; }
    await fetch(WEB_URL, { method:"POST", body:JSON.stringify({action:"add", data:newData}) });
    await loadData();
    closeForm();
  }
  async function updateData() {
    const rowIdx = rowIndexInput.value;
    if(rowIdx === "") return alert("No row");
    const updData = getFormData();
    if(!updData[1]?.trim()) { alert("Name required"); return; }
    await fetch(WEB_URL, { method:"POST", body:JSON.stringify({action:"update", row:parseInt(rowIdx), data:updData}) });
    await loadData();
    closeForm();
  }
  function showForm() {
    listSection.style.display = "none";
    formSection.style.display = "block";
    saveBtn.style.display = "inline-flex";
    updateBtn.style.display = "none";
    rowIndexInput.value = "";
    slInput.value = tableData.length+1;
    nameInput.value = ""; coInput.value = ""; villageInput.value = ""; moujaInput.value = ""; plotInput.value = ""; areaInput.value = ""; dueInput.value = ""; paidInput.value = ""; typeInput.value = ""; pageInput.value = "";
  }
  function closeForm() { formSection.style.display = "none"; listSection.style.display = "block"; }
  async function loadData() {
    try {
      const res = await fetch(WEB_URL);
      const data = await res.json();
      tableData = Array.isArray(data) ? data : [];
      filteredData = [...tableData];
      renderCards(filteredData);
      updateInsights(tableData);
      realtimeSearch.value = ""; // reset search field on reload
    } catch(err) { cardsStack.innerHTML = `<div class="empty-state">⚠️ Network error / CORS. Check script URL.</div>`; }
  }

  // realtime search event
  realtimeSearch.addEventListener("input", realtimeSearchAndRender);
  openFormBtn.onclick = showForm;
  closeFormBtn.onclick = closeForm;
  saveBtn.onclick = addData;
  updateBtn.onclick = updateData;
  loadData();
</script>
</body>
</html>
