<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Drive Slideshow</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
}

#slide{
width:100%;
height:100vh;
object-fit:contain;
}

</style>

</head>

<body>

<img id="slide">

<script>

const api="https://script.google.com/macros/s/AKfycbytQEfVIq5d0KnzZv3AtszjN8XCY_pcdZ3j5O7SBYzHk39N9HpWql7OdbdN4jsF-qRJbw/exec";

let images=[];
let index=0;

fetch(api)
.then(res=>res.json())
.then(data=>{

images=data;

showSlide();

setInterval(showSlide,3000);

});

function showSlide(){

if(images.length==0) return;

document.getElementById("slide").src=images[index];

index++;

if(index>=images.length){
index=0;
}

}

</script>

</body>
</html>
