<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Welcome | Certificate Portal | Steel Rain</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a1e2a 0%, #0c0f17 100%);
            font-family: 'Cinema', 'Segoe UI', 'Poppins', 'Montserrat', 'Inter', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            cursor: default;
        }

        /* ---------- RAIN BACKGROUND (Canvas) ---------- */
        #rainCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
            pointer-events: none;
            background: transparent;
        }

        /* dark cinematic overlay to enhance steel color contrast */
        .dark-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.65) 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* subtle film grain (cinematic touch) */
        .film-grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjciIG51bU9jdGF2ZXM9IjMiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuMDgiLz48L3N2Zz4=');
            background-repeat: repeat;
            opacity: 0.4;
            mix-blend-mode: overlay;
            animation: subtleGrainShift 10s steps(2) infinite;
        }

        @keyframes subtleGrainShift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(1.5%, 1%); }
        }

        /* main content container */
        .cinema-wrapper {
            position: relative;
            z-index: 20;
            text-align: center;
            padding: 2rem;
            width: 100%;
            max-width: 1300px;
            perspective: 1200px;
        }

        /* STEEL COLOR TEXT - metallic grey with cool blue/cool grey reflections */
        .hero-title {
            font-size: clamp(2.2rem, 10vw, 5.8rem);
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            background: linear-gradient(135deg, #b0b7c6 0%, #8e95a5 25%, #cbd2df 50%, #9da4b5 75%, #bdc3d1 100%);
            background-size: 300% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6), 0 0 8px rgba(110, 120, 140, 0.5);
            animation: steelFlow 12s infinite alternate, smoothBreathing 4s ease-in-out infinite;
            position: relative;
            display: inline-block;
            transform-style: preserve-3d;
            transition: all 0.2s;
        }

        /* steel underline with cool metallic pulse */
        .title-glow {
            display: inline-block;
            position: relative;
        }

        .title-glow::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 10%;
            width: 80%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #8e9aaf, #b9c3d4, #7d889e, transparent);
            border-radius: 4px;
            filter: blur(1px);
            animation: underlinePulse 2.8s infinite alternate, widenUnderline 1.8s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
            box-shadow: 0 0 12px rgba(120, 140, 170, 0.7);
        }

        /* steel sub-text */
        .cinematic-sub {
            margin-top: 2.2rem;
            font-size: clamp(0.9rem, 3.5vw, 1.2rem);
            font-weight: 500;
            letter-spacing: 0.3rem;
            text-transform: uppercase;
            color: #9aa3b5;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
            opacity: 0;
            animation: fadeUpSubtle 2s ease-out 1.4s forwards;
            font-family: 'Cinema', 'Courier New', monospace;
            word-spacing: 0.3rem;
            background: linear-gradient(120deg, #b7bfce, #8c94a5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 600;
        }

        /* decorative steel-toned reel dots */
        .cinema-reel {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2.8rem;
            opacity: 0;
            animation: fadeInStagger 2.2s ease-out 1.8s forwards;
        }

        .reel-dot {
            width: 8px;
            height: 8px;
            background: #8f99ae;
            border-radius: 50%;
            box-shadow: 0 0 8px #b7c2da;
            animation: pulseDot 1.8s infinite alternate;
        }

        .reel-dot:nth-child(2) { animation-delay: 0.3s; }
        .reel-dot:nth-child(3) { animation-delay: 0.6s; }
        .reel-dot:nth-child(4) { animation-delay: 0.9s; }
        .reel-dot:nth-child(5) { animation-delay: 1.2s; }

        /* light sweep (silver/cool reflection) */
        .light-sweep {
            position: absolute;
            top: 0;
            left: -100%;
            width: 70%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(170, 180, 210, 0.25), transparent);
            transform: skewX(-20deg);
            pointer-events: none;
            animation: sweepLight 5s infinite ease-in-out 2s;
            z-index: 3;
            filter: blur(8px);
        }

        .hero-container {
            position: relative;
            display: inline-block;
        }

        /* letterbox + vignette to enhance steel mood */
        .letterbox-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
            box-shadow: inset 0px 0px 70px rgba(0,0,0,0.8), inset 0px 0px 4px rgba(100,120,150,0.3);
        }

        .vignette-radial {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.6) 95%);
            pointer-events: none;
            z-index: 5;
        }

        /* ----- KEYFRAMES (cinematic + steel elegance) ----- */
        @keyframes steelFlow {
            0% {
                background-position: 0% 50%;
                text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            }
            100% {
                background-position: 100% 50%;
                text-shadow: 0 2px 15px rgba(80, 100, 130, 0.7);
            }
        }

        @keyframes smoothBreathing {
            0% {
                transform: scale(1);
                filter: drop-shadow(0 0 2px rgba(110,120,140,0.3));
            }
            100% {
                transform: scale(1.012);
                filter: drop-shadow(0 0 6px rgba(140,160,190,0.5));
            }
        }

        @keyframes underlinePulse {
            0% {
                opacity: 0.4;
                width: 50%;
                left: 25%;
                filter: blur(1px);
                background: linear-gradient(90deg, transparent, #7a869c, #a0aec9, #6e7b96, transparent);
            }
            100% {
                opacity: 1;
                width: 85%;
                left: 7.5%;
                filter: blur(0.5px);
                box-shadow: 0 0 18px rgba(130, 150, 185, 0.8);
                background: linear-gradient(90deg, transparent, #9fadc9, #cbd6ec, #8a99b5, transparent);
            }
        }

        @keyframes widenUnderline {
            0% {
                width: 0%;
                left: 50%;
                opacity: 0;
            }
            100% {
                width: 80%;
                left: 10%;
                opacity: 1;
            }
        }

        @keyframes fadeUpSubtle {
            0% {
                opacity: 0;
                transform: translateY(18px);
                filter: blur(4px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        @keyframes fadeInStagger {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes pulseDot {
            0% {
                opacity: 0.3;
                transform: scale(0.6);
                background: #7d889e;
            }
            100% {
                opacity: 1;
                transform: scale(1.3);
                background: #cbd2e3;
                box-shadow: 0 0 12px #b9c4db;
            }
        }

        @keyframes sweepLight {
            0% {
                left: -100%;
            }
            30% {
                left: 120%;
            }
            100% {
                left: 120%;
            }
        }

        /* flicker effect for cinematic mood */
        .cinema-wrapper {
            animation: flicker 0.28s infinite;
            animation-iteration-count: 1;
            animation-fill-mode: forwards;
        }

        @keyframes flicker {
            0% { opacity: 0.98; }
            5% { opacity: 0.93; }
            10% { opacity: 0.99; }
            100% { opacity: 1; }
        }

        @media (max-width: 680px) {
            .hero-title {
                letter-spacing: 0.08em;
            }
            .cinematic-sub {
                letter-spacing: 0.18rem;
            }
            .title-glow::after {
                bottom: -6px;
            }
        }

        /* interactive ripple (steel colored) */
        .ripple-effect {
            position: fixed;
            border-radius: 50%;
            border: 1px solid rgba(140, 160, 190, 0.7);
            pointer-events: none;
            z-index: 999;
            transform: scale(0);
            opacity: 0.7;
            transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1), opacity 0.8s ease-out;
        }
    </style>
</head>
<body>

    <!-- CANVAS FOR DYNAMIC RAIN DROPS BACKGROUND -->
    <canvas id="rainCanvas"></canvas>
    <div class="dark-overlay"></div>
    <div class="film-grain"></div>

    <div class="cinema-wrapper">
        <div class="hero-container">
            <div class="hero-title title-glow">
                Welcome to<br>Certificate Portal
            </div>
            <div class="light-sweep"></div>
        </div>

        <div class="cinematic-sub">
             ✦ Official Certificate Zone · Bhagabanpur ✦
        </div>

        <div class="cinema-reel">
            <span class="reel-dot"></span>
            <span class="reel-dot"></span>
            <span class="reel-dot"></span>
            <span class="reel-dot"></span>
            <span class="reel-dot"></span>
        </div>
    </div>

    <div class="letterbox-mask"></div>
    <div class="vignette-radial"></div>

    <script>
        (function() {
            // ---------- RAIN DROPS BACKGROUND (advanced, performant) ----------
            const canvas = document.getElementById('rainCanvas');
            let ctx = canvas.getContext('2d');
            let width = window.innerWidth;
            let height = window.innerHeight;
            
            // Rain drop objects
            let raindrops = [];
            const DROP_COUNT = 220;        // dense but elegant rain
            const WIND_VARIATION = 0.6;     // subtle slant
            
            class RainDrop {
                constructor(x, y, length, speed, opacity, windOffset) {
                    this.x = x;
                    this.y = y;
                    this.length = length;
                    this.speed = speed;
                    this.opacity = opacity;
                    this.windOffset = windOffset;
                }
                update() {
                    this.y += this.speed;
                    this.x += this.windOffset * 0.4;
                    if (this.y > height) {
                        this.y = -this.length - Math.random() * 40;
                        this.x = Math.random() * width;
                        // reinitialize slightly for natural variation
                        this.windOffset = (Math.random() - 0.5) * WIND_VARIATION;
                    }
                    if (this.x > width + 30) this.x = -30;
                    if (this.x < -30) this.x = width + 30;
                }
                draw(ctx) {
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x + (this.windOffset * 1.2), this.y + this.length);
                    ctx.strokeStyle = `rgba(150, 165, 190, ${this.opacity * 0.7})`;
                    ctx.lineWidth = 1.2;
                    ctx.stroke();
                    // add tiny droplet glow at tip for cinematic reflection
                    ctx.beginPath();
                    ctx.arc(this.x + (this.windOffset * 0.6), this.y + this.length - 2, 1.2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(185, 200, 225, ${this.opacity * 0.5})`;
                    ctx.fill();
                }
            }
            
            function initRain() {
                raindrops = [];
                for (let i = 0; i < DROP_COUNT; i++) {
                    let length = 8 + Math.random() * 18;
                    let speed = 5 + Math.random() * 12;
                    let opacity = 0.25 + Math.random() * 0.55;
                    let wind = (Math.random() - 0.5) * WIND_VARIATION;
                    let x = Math.random() * width;
                    let y = Math.random() * height;
                    raindrops.push(new RainDrop(x, y, length, speed, opacity, wind));
                }
            }
            
            // Add occasional splash particles for enhanced rain effect (optional)
            let splashes = [];
            class Splash {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.life = 1.0;
                }
                update() {
                    this.life -= 0.025;
                }
                draw(ctx) {
                    if (this.life <= 0) return;
                    let radius = 2.5 * (1 - this.life);
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(140, 160, 190, ${this.life * 0.6})`;
                    ctx.fill();
                }
            }
            
            function addSplash(x, y) {
                if (x > 0 && x < width && y > 0 && y < height) {
                    splashes.push(new Splash(x, y));
                }
            }
            
            let lastTimestamp = 0;
            function animateRain(now) {
                if (!ctx) return;
                ctx.clearRect(0, 0, width, height);
                // Draw rain streaks
                for (let drop of raindrops) {
                    drop.update();
                    drop.draw(ctx);
                }
                // draw splashes
                for (let i = 0; i < splashes.length; i++) {
                    splashes[i].draw(ctx);
                    splashes[i].update();
                    if (splashes[i].life <= 0) {
                        splashes.splice(i, 1);
                        i--;
                    }
                }
                requestAnimationFrame(animateRain);
            }
            
            // generate occasional splashes on lower area - simulate raindrops hitting ground
            function generateRandomSplashes() {
                setInterval(() => {
                    if (!canvas || !ctx) return;
                    for (let i = 0; i < 5; i++) {
                        let randomX = Math.random() * width;
                        let groundY = height - Math.random() * 12;
                        addSplash(randomX, groundY);
                    }
                }, 800);
            }
            
            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                initRain();
                // reapply context style after resize
                if (ctx) {
                    ctx.lineCap = 'round';
                    ctx.shadowBlur = 0;
                }
            }
            
            // setup canvas and rain
            function setupRain() {
                canvas.width = width;
                canvas.height = height;
                ctx = canvas.getContext('2d');
                ctx.lineCap = 'round';
                initRain();
                animateRain();
                generateRandomSplashes();
                window.addEventListener('resize', () => {
                    resizeCanvas();
                });
            }
            
            // steel coloured interactive click ripple effect (steel ring)
            function addSteelRipple(x, y) {
                const rippleDiv = document.createElement('div');
                rippleDiv.classList.add('ripple-effect');
                rippleDiv.style.left = x - 20 + 'px';
                rippleDiv.style.top = y - 20 + 'px';
                rippleDiv.style.width = '40px';
                rippleDiv.style.height = '40px';
                rippleDiv.style.border = '1.5px solid #9aaec9';
                rippleDiv.style.boxShadow = '0 0 8px #b9c4dd';
                document.body.appendChild(rippleDiv);
                setTimeout(() => {
                    rippleDiv.style.transform = 'scale(7)';
                    rippleDiv.style.opacity = '0';
                }, 10);
                setTimeout(() => {
                    if (rippleDiv && rippleDiv.remove) rippleDiv.remove();
                }, 800);
            }
            
            // cinematic flash on load
            const overlayFlash = document.createElement('div');
            overlayFlash.style.position = 'fixed';
            overlayFlash.style.top = '0';
            overlayFlash.style.left = '0';
            overlayFlash.style.width = '100%';
            overlayFlash.style.height = '100%';
            overlayFlash.style.backgroundColor = '#d9e2f0';
            overlayFlash.style.pointerEvents = 'none';
            overlayFlash.style.zIndex = '9999';
            overlayFlash.style.opacity = '0';
            overlayFlash.style.transition = 'opacity 1.2s ease-out';
            document.body.appendChild(overlayFlash);
            
            setTimeout(() => {
                overlayFlash.style.opacity = '0.2';
                setTimeout(() => {
                    overlayFlash.style.opacity = '0';
                    setTimeout(() => {
                        if (overlayFlash && overlayFlash.remove) overlayFlash.remove();
                    }, 1400);
                }, 180);
            }, 70);
            
            // animate text steel shimmer
            const heroTitle = document.querySelector('.hero-title');
            if (heroTitle) {
                setInterval(() => {
                    if (!heroTitle) return;
                    let shimmer = Math.sin(Date.now() * 0.003) * 0.15 + 0.85;
                    heroTitle.style.textShadow = `0 2px 14px rgba(0,0,0,0.6), 0 0 ${8 + Math.sin(Date.now() * 0.007) * 3}px rgba(110, 130, 170, 0.6)`;
                }, 150);
            }
            
            // particle burst on load (subtle steel dust)
            function burstSteelParticles() {
                for (let i = 0; i < 40; i++) {
                    const particle = document.createElement('div');
                    particle.style.position = 'fixed';
                    particle.style.width = '3px';
                    particle.style.height = '3px';
                    particle.style.background = '#a5b5cf';
                    particle.style.borderRadius = '50%';
                    particle.style.filter = 'blur(1px)';
                    particle.style.pointerEvents = 'none';
                    particle.style.zIndex = '25';
                    particle.style.left = '50%';
                    particle.style.top = '50%';
                    particle.style.opacity = '0.8';
                    document.body.appendChild(particle);
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Math.random() * 140 + 30;
                    const tx = (Math.cos(angle) * dist) + (Math.random() * 70 - 35);
                    const ty = (Math.sin(angle) * dist) + (Math.random() * 60 - 30);
                    particle.animate([
                        { transform: `translate(-50%, -50%) scale(1)`, opacity: 0.7, offset: 0 },
                        { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity: 0, offset: 1 }
                    ], {
                        duration: 1100 + Math.random() * 400,
                        easing: 'cubic-bezier(0.2, 0.8, 0.4, 1)',
                        fill: 'forwards'
                    });
                    setTimeout(() => { if(particle && particle.remove) particle.remove(); }, 1500);
                }
            }
            
            // add click event with steel ripple
            document.body.addEventListener('click', (e) => {
                addSteelRipple(e.clientX, e.clientY);
            });
            
            // initialize everything
            setupRain();
            window.addEventListener('load', () => {
                burstSteelParticles();
                // additional small rain drop effect: enhance dynamic look
                const sub = document.querySelector('.cinematic-sub');
                if (sub) {
                    sub.style.opacity = '1';
                }
            });
            
            // add a slight parallax to rain? not needed but smooth.
            let lastKnownScroll = 0;
            window.addEventListener('scroll', () => {
                // just to keep canvas perfect
                if (canvas) canvas.style.transform = 'translateZ(0)';
            });
        })();
    </script>
</body>
</html>
