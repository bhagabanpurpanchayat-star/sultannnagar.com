<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GP Management Portal</title>

<style>

body{
margin:0;
font-family:Segoe UI, Arial;
background:#eef2f7;
}

/* HEADER */

.header{
background:linear-gradient(90deg,#1d3557,#457b9d);
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
letter-spacing:1px;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

/* NAVBAR */

.navbar{
background:white;
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.navbar a{
display:flex;
align-items:center;
gap:6px;
background:#f8f9fb;
color:#333;
padding:10px 18px;
margin:5px;
border-radius:6px;
text-decoration:none;
font-size:14px;
border:1px solid #e0e4ea;
transition:all .3s;
}

.navbar a:hover{
background:#1abc9c;
color:white;
transform:translateY(-2px);
box-shadow:0 3px 6px rgba(0,0,0,0.2);
}

/* CONTENT AREA */

.content{
height:calc(100vh - 120px);
padding:5px;
}

iframe{
width:100%;
height:100%;
border:none;
background:white;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

</style>
</head>

<body>

<div class="header">
Gram Panchayat Certificate Management Portal
</div>

<div class="navbar">

<a href="residential.htm" target="page">🏠 Residential</a>
<a href="income.htm" target="page">💰 Income</a>
<a href="sameperson.htm" target="page">🪪 Same Person</a>
<a href="landnoc.htm" target="page">🌾 Land NOC</a>
<a href="death.htm" target="page">⚰️ Death</a>
<a href="character.htm" target="page">🛡️ Character</a>
<a href="election.htm" target="page">🗳️ Election</a>
<a href="distance.htm" target="page">📏 Distance</a>
<a href="academicgap.htm" target="page">🎓 Academic Gap</a>

</div>

<div class="content">
<iframe name="page" src="slide.htm"></iframe>
</div>

</body>
</html>
